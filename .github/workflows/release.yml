name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  desktop-release:
    name: Desktop Release (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-22.04
          - platform: windows-x86_64
            runner: windows-2022

    defaults:
      run:
        working-directory: src-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Run frontend checks
        run: npm run lint && npm test && npm run build

      - name: Run backend tests
        run: cargo test --manifest-path ../src-backend/Cargo.toml

      - name: Build desktop bundles
        run: npm run tauri:build

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-frontend/src-tauri/target/release/bundle/**/*.AppImage
            src-frontend/src-tauri/target/release/bundle/**/*.deb
            src-frontend/src-tauri/target/release/bundle/**/*.rpm
            src-frontend/src-tauri/target/release/bundle/**/*.msi
            src-frontend/src-tauri/target/release/bundle/**/*.exe
          generate_release_notes: true

      - name: Upload workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: llamastudio-${{ matrix.platform }}
          path: |
            src-frontend/src-tauri/target/release/bundle/**/*.AppImage
            src-frontend/src-tauri/target/release/bundle/**/*.deb
            src-frontend/src-tauri/target/release/bundle/**/*.rpm
            src-frontend/src-tauri/target/release/bundle/**/*.msi
            src-frontend/src-tauri/target/release/bundle/**/*.exe
